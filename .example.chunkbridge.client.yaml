mode: client

listen:
  address: "127.0.0.1"
  port: 8080

transport:
  type: max
  max:
    token_env: MAX_API_TOKEN
    from_handle: "@my-agent"
    to_handle: "@exit-agent"
    poll_ms: 1000

crypto:
  passphrase_env: "CHUNKBRIDGE_SHARED_KEY"
  salt: "saltchangeme1234"
  argon2_time: 1
  argon2_memory_kb: 65536
  argon2_threads: 4

rate_limits:
  global_rps: 5
  data_rps: 4
  control_rps: 2
  burst: 10
  message:
    max_chars: 4000
    safe_chars: 3600
    max_b64_chars: 3400
  ack:
    interval_ms: 500
    timeout_ms: 5000
    max_retries: 5
  window:
    initial_size: 4
    max_size: 16
    min_size: 1

policy:
  block_private_ranges: false
  allowed_schemes:
    - http
    - https
  max_response_bytes: 10485760

log:
  level: info
  format: text
