name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    name: build-and-test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Download modules
        run: go mod download

      - name: Format check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./... -timeout 120s

      - name: Race test
        run: go test -race ./... -timeout 120s

      - name: Build
        run: go build -o bin/chunkbridge ./cmd/chunkbridge

      - name: Selftest
        env:
          CHUNKBRIDGE_SHARED_KEY: testpassphrase
        run: go run ./cmd/chunkbridge selftest
