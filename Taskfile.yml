version: '3'

tasks:
  build:
    desc: Build the chunkbridge binary
    cmds:
      - go build -o bin/chunkbridge ./cmd/chunkbridge

  test:
    desc: Run all tests
    cmds:
      - go test ./... -timeout 120s

  test-unit:
    desc: Run unit tests only
    cmds:
      - go test ./internal/... -timeout 60s

  test-integration:
    desc: Run integration tests only
    cmds:
      - go test ./tests/integration/... -timeout 60s -v

  selftest:
    desc: Run the built-in selftest (requires CHUNKBRIDGE_SHARED_KEY or uses testpassphrase)
    env:
      CHUNKBRIDGE_SHARED_KEY: '{{.CHUNKBRIDGE_SHARED_KEY | default "testpassphrase"}}'
    cmds:
      - go run ./cmd/chunkbridge selftest

  fmt:
    desc: Format all Go source files (mutating)
    cmds:
      - go fmt ./...

  fmt-check:
    desc: Fail if any Go files are not gofmt-clean (non-mutating; used in CI)
    cmds:
      - |
        unformatted=$(gofmt -l .)
        if [ -n "$unformatted" ]; then
          echo "The following files are not gofmt-clean:"
          echo "$unformatted"
          exit 1
        fi

  lint:
    desc: Run go vet (static analysis)
    cmds:
      - go vet ./...

  test-race:
    desc: Run all tests with the race detector
    cmds:
      - go test -race ./... -timeout 120s

  vet:
    desc: Run go vet
    cmds:
      - go vet ./...

  tidy:
    desc: Run go mod tidy
    cmds:
      - go mod tidy

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/

  build-all:
    desc: Cross-compile release binaries for all supported platforms into bin/
    cmds:
      - GOOS=linux   GOARCH=amd64  go build -o bin/chunkbridge-linux-amd64       ./cmd/chunkbridge
      - GOOS=linux   GOARCH=arm64  go build -o bin/chunkbridge-linux-arm64       ./cmd/chunkbridge
      - GOOS=darwin  GOARCH=arm64  go build -o bin/chunkbridge-darwin-arm64      ./cmd/chunkbridge
      - GOOS=darwin  GOARCH=amd64  go build -o bin/chunkbridge-darwin-amd64      ./cmd/chunkbridge
      - GOOS=windows GOARCH=amd64  go build -o bin/chunkbridge-windows-amd64.exe ./cmd/chunkbridge

  check:
    desc: Run all CI checks locally (fmt-check, lint, test, race, build, selftest)
    cmds:
      - task: fmt-check
      - task: lint
      - task: test
      - task: test-race
      - task: build
      - task: selftest

  test-live-max:
    desc: |
      Run optional live MAX API contract validation tests.
      Requires real credentials in the environment — do NOT run in CI.
      Required env vars:
        CHUNKBRIDGE_LIVE_MAX_TESTS=1
        CHUNKBRIDGE_MAX_BASE_URL
        CHUNKBRIDGE_MAX_TOKEN
        CHUNKBRIDGE_MAX_PEER_CHAT_ID
      Optional:
        CHUNKBRIDGE_MAX_POLL_TIMEOUT_SEC
        CHUNKBRIDGE_MAX_EXPECT_RECEIVE=1
      See docs/live-max-validation.md for full instructions.
    cmds:
      - CHUNKBRIDGE_LIVE_MAX_TESTS=1 go test -tags=live ./internal/transport -run Live -v -count=1

  all:
    desc: Build and test
    deps: [build, vet, test]
